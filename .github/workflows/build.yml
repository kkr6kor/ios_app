name: Build Cairn App for iOS

on:
  workflow_dispatch: # Enables the manual "Run" button

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project with XcodeGen
        run: xcodegen generate

      # --- START OF OPTION B (DOWNGRADE FORMAT) ---
      - name: Downgrade Xcode Project Format to Xcode 15 Compatibility
        run: |
          PBXPROJ_PATH="Cairn.xcodeproj/project.pbxproj"
          
          if [ -f "$PBXPROJ_PATH" ]; then
            echo "Modifying $PBXPROJ_PATH to support Xcode 15.4..."
            
            # Remove Xcode 16 exclusive attributes safely
            sed -i '' '/minimizedProjectReferenceProxies = 1;/d' "$PBXPROJ_PATH"
            sed -i '' '/preferredProjectObjectVersion = 77;/d' "$PBXPROJ_PATH"
            
            # Change the internal object version from 77 (Xcode 16) to 56 (Xcode 14/15 compatible)
            sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' "$PBXPROJ_PATH"
            
            echo "Successfully downgraded Xcode project format!"
          else
            echo "Error: $PBXPROJ_PATH not found. Ensure XcodeGen ran correctly."
            exit 1
          fi
      # --- END OF OPTION B ---

      - name: Compile Cairn iOS App
        run: |
          xcodebuild -project Cairn.xcodeproj \
                     -scheme Cairn \
                     -configuration Release \
                     -sdk iphoneos \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO \
                     CONFIGURATION_BUILD_DIR=build

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv build/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
